<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="100%" height="100%">
  <!-- Ears -->
  <circle cx="50" cy="50" r="23" fill="#1A202C" />
  <circle cx="150" cy="50" r="23" fill="#1A202C" />
  
  <!-- Head Background/Outline -->
  <ellipse cx="100" cy="95" rx="68" ry="58" fill="#1A202C" />
  <!-- Main Face -->
  <ellipse cx="100" cy="95" rx="64" ry="54" fill="#FFFFFF" />
  
  <!-- Eye Patches (Angled inward, looking down) -->
  <g transform="rotate(-15 75 95)">
    <ellipse cx="75" cy="95" rx="16" ry="22" fill="#1A202C" />
  </g>
  <g transform="rotate(15 125 95)">
    <ellipse cx="125" cy="95" rx="16" ry="22" fill="#1A202C" />
  </g>
  
  <!-- White of the Eyes -->
  <circle cx="78" cy="95" r="5" fill="#FFFFFF" />
  <circle cx="122" cy="95" r="5" fill="#FFFFFF" />
  
  <!-- Pupils (Positioned low to look down at the text area) -->
  <circle cx="78" cy="97" r="2.5" fill="#000000" />
  <circle cx="122" cy="97" r="2.5" fill="#000000" />
  
  <!-- Nose & Muzzle -->
  <ellipse cx="100" cy="108" rx="10" ry="6" fill="#1A202C" />
  <path d="M 92 114 Q 100 120 108 114" stroke="#1A202C" stroke-width="2.5" fill="none" stroke-linecap="round" />
  
  <!-- Paws (Positioned at the very bottom to overlap the border line) -->
  <!-- Left Paw -->
  <ellipse cx="65" cy="152" rx="18" ry="14" fill="#1A202C" />
  <circle cx="54" cy="144" r="3" fill="#FFFFFF" opacity="0.3" />
  <circle cx="65" cy="141" r="3" fill="#FFFFFF" opacity="0.3" />
  <circle cx="76" cy="144" r="3" fill="#FFFFFF" opacity="0.3" />
  
  <!-- Right Paw -->
  <ellipse cx="135" cy="152" rx="18" ry="14" fill="#1A202C" />
  <circle cx="124" cy="144" r="3" fill="#FFFFFF" opacity="0.3" />
  <circle cx="135" cy="141" r="3" fill="#FFFFFF" opacity="0.3" />
  <circle cx="146" cy="144" r="3" fill="#FFFFFF" opacity="0.3" />
</svg>
